services:
  mosquitto:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mosquitto
    restart: unless-stopped
    volumes:
      - ./config/mosquitto.conf:/etc/mosquitto/mosquitto.conf:ro
      - ./config/conf.d:/etc/mosquitto/conf.d:ro
      - mosquitto_data:/mosquitto/data
    env_file:
      - ./.env
    networks:
      - cache
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-W", "5"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.50"
        reservations:
          memory: 64M
          cpus: "0.25"

  valkey:
    image: valkey/valkey:7-alpine
    container_name: valkey
    restart: unless-stopped
    env_file:
      - ./.env
    networks:
      - cache
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
        reservations:
          memory: 32M
          cpus: "0.10"

networks:
  cache:
    name: cache
    external: false

volumes:
  mosquitto_data:
    driver: local
